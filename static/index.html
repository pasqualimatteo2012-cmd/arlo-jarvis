<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <h2>Jarvis</h2>
            <a href="/">Chat</a>
            <a href="/history">Cronologia</a>
        </aside>

        <main class="main">
            <header class="topbar">
                <h1>Assistente Jarvis</h1>
                <p>Chat locale con cronologia</p>
            </header>

            <section id="chat" class="chat-box"></section>

            <section class="input-area">
                <input type="text" id="msg" placeholder="Scrivi un messaggio...">
                <button onclick="sendMessage()">Invia</button>
            </section>
        </main>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("msg");
            const chat = document.getElementById("chat");
            const msg = input.value.trim();

            if (!msg) return;

            chat.innerHTML += `
                <div class="message user">
                    <div class="bubble">
                        <strong>Tu</strong><br>${msg}
                    </div>
                </div>
            `;

            input.value = "";

            const res = await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({message: msg})
            });

            const data = await res.json();

            chat.innerHTML += `
                <div class="message jarvis">
                    <div class="bubble">
                        <strong>Jarvis</strong><br>${data.response}
                    </div>
                </div>
            `;

            chat.scrollTop = chat.scrollHeight;
        }

        document.getElementById("msg").addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
